{% extends 'jornal/base.html' %}

{% block content %}
<article>
    <h1 class="display-4 fw-bold">{{ artigo.titulo }}</h1>
    <p class="text-muted">Publicado em {{ artigo.data_publicacao }}</p>
    <hr>
    <div class="lead" style="white-space: pre-line;">
        {{ artigo.corpo }}
    </div>
    <a href="{% url 'home' %}" class="btn btn-secondary mt-5">Voltar à lista</a>
</article>
{% endblock %}
